<!DOCTYPE html>
<html>
<head>
    <title>Neon Dodger</title>
    <style>
        body { margin: 0; background: #05070a; color: white; font-family: 'Courier New', monospace; text-align: center; overflow: hidden; }
        canvas { display: block; margin: 10px auto; border: 2px solid #00f2ff; background: #000; cursor: crosshair; }
        .ui { padding: 10px; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 20px; border: 1px solid #00f2ff; }
        button { padding: 10px 20px; background: #00f2ff; border: none; cursor: pointer; font-weight: bold; }
        .btn-back { display: inline-block; margin-top: 10px; color: #00f2ff; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

    <div class="ui">
        <h1>NEON DODGER</h1>
        <div>SCORE: <span id="scoreText">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="overlay">
        <h2 id="msg">READY?</h2>
        <button onclick="startGame()">START GAME</button>
        <br>
        <a href="scratch.html" class="btn-back">Return to Scratch Page</a>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreText = document.getElementById("scoreText");
        const overlay = document.getElementById("overlay");
        const msg = document.getElementById("msg");

        canvas.width = 600;
        canvas.height = 450;

        let score = 0;
        let gameActive = false;
        let player = { x: 300, y: 400, size: 20 };
        let enemies = [];
        let stars = [];

        // Initialize Stars
        for(let i=0; i<50; i++) {
            stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2 });
        }

        window.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.size/2;
            player.y = e.clientY - rect.top - player.size/2;
        });

        function startGame() {
            score = 0;
            enemies = [];
            gameActive = true;
            overlay.style.display = "none";
            scoreText.innerText = "0";
            update();
        }

        function spawnEnemy() {
            if(!gameActive) return;
            enemies.push({
                x: Math.random() * canvas.width,
                y: -20,
                r: Math.random() * 10 + 10,
                v: Math.random() * 3 + 2 + (score/500)
            });
            setTimeout(spawnEnemy, 600);
        }

        function update() {
            if(!gameActive) return;

            // Background
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stars
            ctx.fillStyle = "white";
            stars.forEach(st => {
                st.y += 1;
                if(st.y > canvas.height) st.y = 0;
                ctx.fillRect(st.x, st.y, st.s, st.s);
            });

            // Player
            ctx.strokeStyle = "#00f2ff";
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x, player.y, player.size, player.size);

            // Enemies
            enemies.forEach((en, i) => {
                en.y += en.v;
                ctx.fillStyle = "#ff0055";
                ctx.beginPath();
                ctx.arc(en.x, en.y, en.r, 0, Math.PI*2);
                ctx.fill();

                // Simple Box-to-Circle Collision
                if (player.x < en.x + en.r && player.x + player.size > en.x - en.r &&
                    player.y < en.y + en.r && player.y + player.size > en.y - en.r) {
                    gameOver();
                }

                if(en.y > canvas.height + 20) {
                    enemies.splice(i, 1);
                    score += 10;
                    scoreText.innerText = score;
                }
            });

            if(gameActive) requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            msg.innerHTML = "<span style='color:red'>YOU LOST</span><br>Score: " + score;
            overlay.style.display = "block";
        }

        spawnEnemy();
    </script>
</body>
</html>
