<!DOCTYPE html>
<html>
<head>
    <title>Space Dodge: Starfield Edition</title>
    <style>
        body { margin: 0; background: #05070a; color: white; font-family: 'Courier New', Courier, monospace; text-align: center; overflow: hidden; }
        canvas { display: block; margin: 20px auto; border: 3px solid #00f2ff; box-shadow: 0 0 30px #00f2ff; cursor: none; background: #000; }
        .ui { position: absolute; top: 15px; width: 100%; pointer-events: none; text-shadow: 2px 2px 5px #000; }
        #status { font-size: 24px; font-weight: bold; transition: 0.3s; }
        .btn-back { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 25px; background: #00f2ff; color: #05070a; text-decoration: none; border-radius: 4px; font-weight: bold; border: 2px solid white; }
        .btn-back:hover { background: white; }
    </style>
</head>
<body>

    <div class="ui">
        <h1>NEON DODGER</h1>
        <p>SCORE: <span id="score">0</span></p>
        <div id="status">SURVIVE THE VOID</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <a href="scratch.html" class="btn-back">EXIT TO SCRATCH PAGE</a>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const statusEl = document.getElementById("status");

        canvas.width = 700;
        canvas.height = 500;

        let score = 0;
        let gameActive = true;
        let player = { x: 350, y: 400, w: 25, h: 25 };
        let enemies = [];
        let stars = [];

        // Create initial Starfield
        for(let i=0; i<100; i++) {
            stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*2+1 });
        }

        window.addEventListener("mousemove", (e) => {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.w/2;
            player.y = e.clientY - rect.top - player.h/2;
        });

        function spawnEnemy() {
            if(!gameActive) return;
            enemies.push({
                x: Math.random() * canvas.width,
                y: -30,
                radius: Math.random() * 15 + 10,
                speed: Math.random() * 4 + 3 + (score/1000)
            });
            setTimeout(spawnEnemy, Math.max(200, 600 - (score/10)));
        }

        function update() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Draw & Move Stars
            ctx.fillStyle = "white";
            stars.forEach(s => {
                s.y += s.speed;
                if(s.y > canvas.height) s.y = 0;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
            });

            if (!gameActive) {
                // Game Over Overlay
                ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "50px Courier New";
                ctx.fillText("YOU LOST", 230, 250);
                ctx.font = "20px Courier New";
                ctx.fillText("REFRESH TO RESTART", 245, 300);
                return;
            }

            // 2. Draw Player (Neon Blue Square)
            ctx.strokeStyle = "#00f2ff";
            ctx.lineWidth = 3;
            ctx.strokeRect(player.x, player.y, player.w, player.h);
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00f
