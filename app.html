<!DOCTYPE html>
<html>
<head>
    <title>Number Guess Game</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #eef; }
        .card { background: white; padding: 30px; display: inline-block; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Guess the Number</h1>
        <p>I'm thinking of a number between 1 and 100.</p>
        <input type="number" id="guess" placeholder="1-100">
        <button onclick="check()">Check</button>
        <p id="msg"></p>
        <br>
        <a href="scratch.html">Back to Scratch Page</a>
    </div>
    <script>
        const target = Math.floor(Math.random() * 100) + 1;
        function check() {
            const val = document.getElementById('guess').value;
            const msg = document.getElementById('msg');
            if (val == target) { msg.innerText = "You got it!"; msg.style.color = "green"; }
            else { msg.innerText = val > target ? "Too high!" : "Too low!"; msg.style.color = "red"; }
        }
    </script>
</body>
</html>
